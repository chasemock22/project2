<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Links to External Resources -->
    <link rel="stylesheet" href="https://bootstrapcdn.com" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <!-- Link to your separate CSS file -->
    <link rel="stylesheet" href="style.css" /> 
    <title>Royal Bank of Canada | My Wallet</title>
</head>
<body>
    <div class="container main-app">
        <header>
            <h2>My Wallet</h2>
            <div class="balance-card">
                <p>Total Balance</p>
                <h1 id="balance">$0.00</h1>
            </div>
        </header>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">$0.00</p>
            </div>
            <div>
                <h4>Expenses</h4>
                <p id="money-minus" class="money minus">$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <ul id="list" class="list"></ul>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g., Salary, Coffee" />
            </div>
            <div class="form-control">
                <label for="amount">Amount (negative = expense)</label>
                <input type="number" id="amount" placeholder="Enter amount..." />
            </div>
            <button class="btn add-btn">Add Transaction</button>
        </form>
    </div>

    <script src="script.js"></script> 
</body>
</html>
